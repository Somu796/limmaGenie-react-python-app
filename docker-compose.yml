services:
  backend:
    build: ./backend
    container_name: limmagenie_backend
    ports:
      - "8000:8000"
    env_file: .env

  frontend:
    build: ./frontend
    container_name: limmagenie_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: .env
    depends_on:
      - backend